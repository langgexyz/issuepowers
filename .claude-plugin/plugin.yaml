name: issuepowers
version: 0.1.0
description: Issue-driven workflow on top of superpowers

depends_on:
  - superpowers

provides:
  commands:
    - solve
    - rollback
  skills:
    - issuepowers:orchestration
    - issuepowers:requirements-understanding
    - issuepowers:deliverable-check
    - issuepowers:rollback
  hooks:
    - SessionStart
  templates:
    - understanding.md
    - split-proposal.md
    - deliverable-report.md
    - rollback.md
